<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录 — 医美数据分析看板</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(160deg, #e0f2fe 0%, #bae6fd 40%, #7dd3fc 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(14, 165, 233, 0.2);
      padding: 40px 36px;
      border: 1px solid rgba(125, 211, 252, 0.5);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.35rem;
      color: #0c4a6e;
      text-align: center;
    }
    .subtitle {
      text-align: center;
      color: #0369a1;
      font-size: 13px;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #334155;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #bae6fd;
      border-radius: 10px;
      font-size: 15px;
      margin-bottom: 18px;
      background: #fff;
    }
    input:focus {
      outline: none;
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.25);
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(90deg, #38bdf8, #0ea5e9);
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 4px 14px rgba(14, 165, 233, 0.35);
    }
    button:hover { filter: brightness(1.05); }
    .error {
      background: #fee2e2;
      color: #b91c1c;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      text-align: center;
    }
    .hint {
      margin-top: 22px;
      font-size: 12px;
      color: #475569;
      text-align: center;
      line-height: 1.6;
    }
    .hint a { color: #0284c7; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <h1>医美数据分析看板</h1>
    <p class="subtitle">基于 Spark 的数据分析系统 · 请登录</p>
    {% if registered %}
    <div class="error" style="background:#d1fae5;color:#065f46;border:1px solid #6ee7b7;">注册成功，请使用新账号登录。</div>
    {% endif %}
    {% if error %}
    <div class="error">用户名或密码错误，请重试。</div>
    {% endif %}
    <form method="post" action="{{ url_for('login') }}">
      {% if next %}
      <input type="hidden" name="next" value="{{ next|e }}" />
      {% endif %}
      <label for="username">用户名</label>
      <input id="username" name="username" type="text" autocomplete="username" required autofocus />
      <label for="password">密码</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />
      <button type="submit">登 录</button>
    </form>
    <p class="hint">默认管理员：<strong>admin</strong> / <strong>admin123</strong>（可在配置中修改）<br />
    <a href="{{ url_for('register') }}">没有账号？注册新用户</a></p>
  </div>
</body>
</html>
